openapi: 3.0.3
info:
  title: CTF AttackAPI Server
  description: REST API for attack-defense CTF attack information, fully cached
  version: 0.1.0
servers:
  - url: http://localhost:14320
    description: Your local server instance
paths:
  /api/v1/services:
    get:
      summary: Get list of services
      description: Returns a list of all services with flag infos in the CTF
      operationId: getServices
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesResponse'
        '500':
          description: Internal server error
  
  /api/v1/teams:
    get:
      summary: Get list of teams
      description: Returns a list of all attackable teams in the CTF
      operationId: getTeams
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamsResponse'
        '500':
          description: Internal server error

  /api/v1/attack_info/{service}/{team}:
    get:
      summary: Get the simplified attack info for a service and team
      description: |
        Returns simple attack information (e.g., usernames) as string array for a specific service and team combination.
        In contrast to /api/v1/attack_info_raw, this data is consistent for all supported CTFs.
      operationId: getAttackInfo
      parameters:
        - name: service
          in: path
          required: true
          description: Service name, case insensitive
          schema:
            type: string
          example: "RCEaaS"
        - name: team
          in: path
          required: true
          description: Team identifier (IP address, ID, or name if given)
          schema:
            type: string
          example: "10.32.1.2"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackInfoResponse'
        '400':
          description: Invalid team or service
        '500':
          description: Internal server error

  /api/v1/attack_info_raw/{service}/{team}:
    get:
      summary: Get raw attack info for a service and team
      description: |
        Returns raw attack information (e.g., usernames) as given by the game API for a specific service and team combination.
        In contrast to /api/v1/attack_info, raw data preserves more details like tick and order.
      operationId: getAttackInfoRaw
      parameters:
        - name: service
          in: path
          required: true
          description: Service name, case insensitive
          schema:
            type: string
          example: "RCEaaS"
        - name: team
          in: path
          required: true
          description: Team identifier (IP address, ID, or name if given)
          schema:
            type: string
          example: "10.32.1.2"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackInfoRawResponse'
        '400':
          description: Invalid team or service
        '500':
          description: Internal server error

  /api/v1/raw:
    get:
      summary: Get raw attack info JSON
      description: |
        Returns the complete raw attack information JSON as provided by the game API. 
        Includes all teams and services. Not parsed, not preprocessed.
      operationId: getRaw
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawResponse'
        '500':
          description: Internal server error

components:
  schemas:
    Team:
      type: object
      required:
        - ip
      properties:
        id:
          type: integer
          description: Team ID
          example: 1
        ip:
          type: string
          description: Team IP address
          example: "10.32.1.2"
        name:
          type: string
          nullable: true
          description: Team name, if available
          example: "NOP"
    TeamsResponse:
      type: object
      required:
        - teams
      properties:
        teams:
          type: array
          items:
            $ref: '#/components/schemas/Team'
    ServicesResponse:
      type: object
      required:
        - services
      properties:
        services:
          type: array
          items:
            type: string
          description: List of service names
          example: [ "RCEaaS", "another-service" ]
    AttackInfoResponse:
      type: object
      required:
        - attack_info
      properties:
        attack_info:
          type: array
          items:
            type: string
          description: List of attack targets as string list
          example: [ "username1", "username2", "username3" ]
    AttackInfoRawResponse:
      type: object
      required:
        - attack_info
      properties:
        attack_info:
          oneOf:
            - type: array
            - type: object
          description: List of raw attack targets (e.g., usernames), format is determined by the game API
          example: { "227": "username1", "228": "username2", "229": "username3" }
    RawResponse:
      type: object
      description: Raw attack information JSON as returned by the game API
      additionalProperties: true